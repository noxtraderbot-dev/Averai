<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aver Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="register-container">
        <h1>Create Account</h1>
        <form id="regForm">
            <input type="email" placeholder="Email" required>
            <input type="password" id="pass" placeholder="Password (8+ chars, 1 special)" required>
            <button type="submit">Sign Up</button>
        </form>
        <div class="auth-options">
            <button>Continue with Google</button>
            <button>Continue with Binance</button>
            <button>Continue with Coinbase</button>
        </div>
        <footer>
            <p>Aver is a registered trademark of The New York Stock Exchange (NYSE). The entire Aver project was run and built by the NYSE.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
