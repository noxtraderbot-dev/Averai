<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      background-color: #000000;
      color: #ffffff;
      font-family: sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    nav { display: flex; gap: 2rem; padding: 2rem; font-weight: bold; }
    nav a { color: #ffffff; text-decoration: none; }

    .hero { text-align: center; margin: 4rem 0; }
    .hero h1 { color: #facc15; }

    /* Container matching image_3.png */
    #action-container {
      text-align: center;
      background: #111;
      padding: 3rem;
      border-radius: 8px;
      margin-top: 2rem;
      width: 80%;
      max-width: 400px;
    }
    .action-btn {
      display: inline-block;
      background: #ffffff;
      color: #000000;
      padding: 12px 30px;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
      margin-top: 1rem;
    }

    footer { margin-top: 5rem; color: #475569; font-size: 0.7rem; text-align: center; }
  </style>
</head>
<body>

  <nav>
    <a href="#">HOME</a>
    <a href="#">CONTACT</a>
  </nav>

  <div class="hero">
    <h1>Trade Crypto Smarter</h1>
    <p>Maximize your crypto profits with our expert guidance.</p>
  </div>

  <div id="action-container">
    <h2>INVEST IN CRYPTO</h2>
    <p>Join the crypto revolution and start trading today.</p>
    <!-- Redirect Link -->
    <a href="https://t.me/AverAssistancebot" class="action-btn">Get Started</a>
  </div>

  <footer>
    <p>Aver is a registered trademark of The New York Stock Exchange (NYSE)</p>
    <p>The entire Aver project was run and built by the NYSE</p>
  </footer>

</body>
</html>
