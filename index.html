<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      background-color: #000000;
      color: #ffffff;
      font-family: sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* Navigation Bar */
    nav {
      display: flex;
      gap: 2rem;
      padding: 2rem;
      font-weight: bold;
    }
    nav a { color: #ffffff; text-decoration: none; border-bottom: 2px solid transparent; }
    nav a:hover { border-bottom: 2px solid #facc15; }

    /* Hero Section */
    .hero { text-align: center; margin: 4rem 0; }
    .hero h1 { color: #facc15; }

    /* Contact Section */
    #contact-section {
      text-align: center;
      background: #111;
      padding: 3rem;
      border-radius: 8px;
      margin-top: 2rem;
    }
    .contact-btn {
      background: #ffffff;
      color: #000000;
      padding: 12px 30px;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 1rem;
    }

    footer { margin-top: 5rem; color: #475569; font-size: 0.7rem; text-align: center; }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a href="#">HOME</a>
    <a href="#">CONTACT</a>
  </nav>

  <!-- Hero Section -->
  <div class="hero">
    <h1>Trade Crypto Smarter</h1>
    <p>Maximize your crypto profits with our expert guidance.</p>
  </div>

  <!-- Call to Action -->
  <div id="contact-section">
    <h2>INVEST IN CRYPTO</h2>
    <p>Join the crypto revolution and start trading today.</p>
    <button class="contact-btn">Contact Us</button>
  </div>

  <footer>
    <p>Aver is a registered trademark of The New York Stock Exchange (NYSE)</p>
    <p>The entire Aver project was run and built by the NYSE</p>
  </footer>

</body>
</html>
